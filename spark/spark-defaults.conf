# Every Spark entrypoint in this image (spark-submit, spark-sql, pyspark)
# gets the Iceberg catalog for free via these defaults.
spark.sql.extensions                 org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# "lake" catalog -> Iceberg REST catalog -> metadata + data on MinIO
spark.sql.catalog.lake               org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lake.type          rest
spark.sql.catalog.lake.uri           http://iceberg-rest:8181
spark.sql.catalog.lake.io-impl       org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.lake.warehouse     s3://lake/lakehouse
spark.sql.catalog.lake.s3.endpoint   http://minio:9000
spark.sql.catalog.lake.s3.path-style-access true

# Right-sized for a laptop, not a cluster
spark.sql.shuffle.partitions         8
spark.ui.showConsoleProgress         false
