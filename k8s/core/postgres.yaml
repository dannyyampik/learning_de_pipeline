# Postgres as a StatefulSet — the canonical "stateful workload on K8s"
# lesson: stable network identity (postgres-0), ordered rollout, and a
# volumeClaimTemplate that gives each replica its own PersistentVolume.
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  clusterIP: None        # headless: DNS resolves to the pod itself
  selector:
    app: postgres
  ports:
    - port: 5432
---
# NodePort so `psql` from the host works (learning convenience only)
apiVersion: v1
kind: Service
metadata:
  name: postgres-external
spec:
  type: NodePort
  selector:
    app: postgres
  ports:
    - port: 5432
      nodePort: 30432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          args: ["-c", "wal_level=logical"]   # ready for Debezium, same as compose
          envFrom:
            - secretRef:
                name: shopstream-secrets
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: db-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "shopstream", "-d", "shopstream"]
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "shopstream", "-d", "shopstream"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 512Mi }
      volumes:
        - name: db-init
          configMap:
            name: db-init
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
