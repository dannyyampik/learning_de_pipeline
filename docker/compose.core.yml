# Phase 0 core stack: the "app" (Postgres OLTP + traffic generator) and the
# future data lake (MinIO). Later phases add their own compose files that
# join the same project/network.
#
#   make up-core   /   docker compose -f docker/compose.core.yml up -d
#
# Credentials are hardcoded dev values on purpose — this stack is local-only.

name: shopstream

services:
  postgres:
    image: postgres:16
    container_name: shopstream-postgres
    environment:
      POSTGRES_USER: shopstream
      POSTGRES_PASSWORD: shopstream
      POSTGRES_DB: shopstream
    # wal_level=logical now so Debezium CDC (phase 2) needs no restart/rebuild
    command: postgres -c wal_level=logical
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopstream -d shopstream"]
      interval: 5s
      timeout: 3s
      retries: 10

  generator:
    build: ../generator
    container_name: shopstream-generator
    environment:
      DATABASE_URL: postgresql://shopstream:shopstream@postgres:5432/shopstream
      ORDERS_PER_MINUTE: "12"
      NEW_CUSTOMERS_PER_MINUTE: "2"
      PRICE_CHANGES_PER_HOUR: "6"
      CUSTOMER_DELETES_PER_HOUR: "0.5"
      # Compressed lifecycle so you can watch orders progress in minutes
      LIFECYCLE_MIN_AGE_SECONDS: "90"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: shopstream-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Let Prometheus scrape /minio/v2/metrics/* without auth (phase 5)
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot job: create the lake bucket, then exit
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/lake &&
        echo 'bucket ready: s3://lake'
      "

volumes:
  pgdata:
  miniodata:
