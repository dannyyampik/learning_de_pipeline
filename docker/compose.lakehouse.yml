# Lakehouse (phase 3): Iceberg REST catalog + Spark streaming jobs.
# Started by `make up-lakehouse` together with core + streaming + olap
# (the KPI job writes to ClickHouse from compose.olap.yml).

name: shopstream

services:
  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: shopstream-iceberg-rest
    environment:
      CATALOG_WAREHOUSE: s3://lake/lakehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      # Catalog metadata in Postgres — the default embedded SQLite store
      # cannot handle concurrent commits from multiple jobs
      CATALOG_URI: jdbc:postgresql://postgres:5432/iceberg
      CATALOG_JDBC_USER: iceberg
      CATALOG_JDBC_PASSWORD: iceberg
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    ports:
      - "8181:8181"
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      # No curl/wget in this image; bash's /dev/tcp checks the port instead
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8181'"]
      interval: 10s
      timeout: 5s
      retries: 12

  spark-bronze:
    build: ../spark
    container_name: shopstream-spark-bronze
    command: /opt/spark/bin/spark-submit /opt/jobs/bronze_ingest.py
    ports:
      - "4040:4040"   # Spark UI: streaming query progress, stages, SQL plans
    environment: &spark-env
      KAFKA_BOOTSTRAP: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_USER: shopstream
      CLICKHOUSE_PASSWORD: shopstream
    volumes:
      - ../jobs/streaming:/opt/jobs:ro
      # Checkpoints on a local volume for simplicity; production puts them
      # on shared storage (S3/HDFS) so any node can resume the stream.
      - sparkchk:/checkpoints
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy
    restart: unless-stopped

  # Spark Connect server (phase 4): lets thin clients — here, Airflow tasks —
  # run DataFrame/SQL code on this Spark without shipping a JVM of their own.
  # Same idea as Databricks Connect.
  spark-connect:
    build: ../spark
    container_name: shopstream-spark-connect
    # spark-submit (not spark-class) so spark-defaults.conf is loaded;
    # "spark-internal" is the placeholder spark-submit expects when the
    # main class ships inside Spark itself.
    command: >
      /opt/spark/bin/spark-submit
      --master local[*]
      --class org.apache.spark.sql.connect.service.SparkConnectServer
      spark-internal
    environment: *spark-env
    ports:
      - "15002:15002"
    depends_on:
      iceberg-rest:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/15002'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  spark-kpis:
    build: ../spark
    container_name: shopstream-spark-kpis
    command: /opt/spark/bin/spark-submit /opt/jobs/realtime_kpis.py
    ports:
      - "4041:4040"   # Spark UI for the KPI job (4040 taken by spark-bronze)
    environment: *spark-env
    volumes:
      - ../jobs/streaming:/opt/jobs:ro
      - sparkchk:/checkpoints
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sparkchk:
